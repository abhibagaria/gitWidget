name: Update contributions

on:
  schedule:
    - cron: '30 3 * * *'      # daily 03:30 UTC = 09:00 IST
  workflow_dispatch:          # allow manual runs

permissions:
  contents: write

concurrency:
  group: update-contributions
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Fetch contributions
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
          GH_LOGIN: abhibagaria
        run: node scripts/fetch-contributions.mjs

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/contributions.json
          git diff --staged --quiet || git commit -m "chore: update contributions ($(date -u +%FT%TZ))"
          git push

      - name: Purge CDN cache
        run: curl -sf "https://purge.jsdelivr.net/gh/abhibagaria/gitWidget@main/data/contributions.json" || true
