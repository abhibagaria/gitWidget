<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GitHub contribution widget — abhibagaria</title>
<link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=switzer@400,500,600&f[]=cabinet-grotesk@800,900&display=swap">
<style>
  /* Standalone page wrapper. The widget itself (widget.js) injects its own
     scoped CSS and inherits these design tokens, so this file no longer
     duplicates the render logic — it just themes and mounts the shared widget. */
  :root {
    --bg:#ffffff; --panel:#f4f4f3; --ink:#0c0c0e; --muted:#6a6a72;
    --line:rgba(12,12,14,.12); --accent:#1f63d6; --accent-ink:#1850b4; --good:#1a7f4b;
    --sans:"Switzer",-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    --display:"Cabinet Grotesk",var(--sans);
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --ease:cubic-bezier(.16,1,.3,1);
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font-family:var(--sans);
    -webkit-font-smoothing:antialiased; padding:40px; }
  #gitwidget { margin:0 auto; }
</style>
</head>
<body>
  <div id="gitwidget"></div>

  <script>
    // freshest first: same-origin file (on Pages) → raw (~5 min cache, CORS) → jsDelivr fallback.
    // widget.js reads this override; runs before the deferred widget script below.
    window.GITWIDGET_SOURCES = [
      './data/contributions.json',
      'https://raw.githubusercontent.com/abhibagaria/gitWidget/main/data/contributions.json',
      'https://cdn.jsdelivr.net/gh/abhibagaria/gitWidget@main/data/contributions.json',
    ];
    // Same for the character's sprite sheet: prefer the same-origin copy.
    window.GITWIDGET_SPRITE_SOURCES = [
      './tiger-sprite.png',
      'https://raw.githubusercontent.com/abhibagaria/gitWidget/main/tiger-sprite.png',
      'https://cdn.jsdelivr.net/gh/abhibagaria/gitWidget@main/tiger-sprite.png',
    ];
  </script>
  <script src="./widget.js" defer></script>
</body>
</html>
