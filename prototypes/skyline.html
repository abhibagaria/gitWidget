<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pixel Skyline — gitWidget prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; background:#0b1026;
    display:flex; align-items:center; justify-content:center; padding:32px;
    font-family:'VT323',monospace; color:#cdd6ff; }
  .card { background:linear-gradient(#15183a,#241a3a); border:4px solid #cdd6ff;
    padding:22px 24px 16px; box-shadow:8px 8px 0 #05071a; overflow:hidden; }
  h1 { font-family:'Press Start 2P'; font-size:12px; margin:0 0 14px; color:#ffd479;
       line-height:1.6; }
  canvas { image-rendering:pixelated; display:block; cursor:crosshair; }
  .foot { margin-top:12px; font-size:18px; display:flex; justify-content:space-between; }
  #tip { position:fixed; pointer-events:none; background:#ffd479; color:#15183a;
         font-size:15px; padding:3px 8px; transform:translate(-50%,-130%);
         white-space:nowrap; opacity:0; z-index:9; font-family:'VT323',monospace; }
</style>
</head>
<body>
  <div class="card">
    <h1>52 weeks · 52 towers</h1>
    <canvas id="c"></canvas>
    <div class="foot">
      <div>taller tower = busier week · lit window = a contribution</div>
      <div><b id="total">0</b> total</div>
    </div>
  </div>
  <div id="tip"></div>

<script src="_data.js"></script>
<script>
  const { weeks, total } = genContributions();
  document.getElementById('total').textContent = total;

  const PX = 9, GAP = 1, W = weeks.length, FLOORH = 4, MAXF = 26, PAD = 6;
  const cw = W*(PX*2+GAP) + PAD*2;
  const ch = MAXF*FLOORH + 40;
  const cv = document.getElementById('c'), ctx = cv.getContext('2d');
  cv.width = cw; cv.height = ch;
  const tip = document.getElementById('tip');

  const sums = weeks.map(w => w.reduce((s,d)=>s+d.count,0));
  const maxSum = Math.max(...sums, 1);
  const bw = PX*2; // building width in px
  const baseY = ch - 18;

  // Stars
  function stars(){ for(let i=0;i<60;i++){ ctx.fillStyle = i%7?'#3a3f6a':'#fff'; const x=(i*97)%cw, y=(i*53)%(ch-60); ctx.fillRect(x,y,1,1);} }
  function moon(){ ctx.fillStyle='#fdf6c8'; ctx.beginPath(); for(let yy=0;yy<14;yy++)for(let xx=0;xx<14;xx++){ if((xx-7)**2+(yy-7)**2<46){ ctx.fillRect(cw-30+xx, 14+yy,1,1);} } }

  const rects = [];
  function draw() {
    ctx.fillStyle = '#0b1026'; ctx.fillRect(0,0,cw,ch);
    stars(); moon();
    ctx.fillStyle = '#070a1c'; ctx.fillRect(0, baseY, cw, ch-baseY); // ground
    rects.length = 0;
    weeks.forEach((week, i) => {
      const floors = Math.max(1, Math.round(sums[i]/maxSum * MAXF));
      const h = floors*FLOORH;
      const x = PAD + i*(bw+GAP);
      const y = baseY - h;
      // building body, hue varies subtly by activity
      const lit = Math.min(1, sums[i]/maxSum);
      ctx.fillStyle = `rgb(${30+lit*40},${34+lit*30},${70+lit*60})`;
      ctx.fillRect(x, y, bw, h);
      ctx.fillStyle = '#cdd6ff22'; ctx.fillRect(x, y, bw, 1); // roof highlight
      // windows: light one per ~ contribution, fill bottom-up
      const winN = Math.min(floors*2, sums[i]);
      let placed = 0;
      for (let f=0; f<floors && placed<winN; f++) {
        for (let cwi=0; cwi<2 && placed<winN; cwi++) {
          const wx = x + 2 + cwi*(PX-1);
          const wy = baseY - (f+1)*FLOORH + 1;
          ctx.fillStyle = (f+cwi)%5===0 ? '#ff7edb' : '#ffd479';
          ctx.fillRect(wx, wy, 3, 2);
          placed++;
        }
      }
      rects.push({x, y, w:bw, h, i, sum:sums[i], date:week[0].date});
    });
  }
  draw();

  cv.addEventListener('mousemove', e => {
    const r = cv.getBoundingClientRect();
    const mx = (e.clientX-r.left)*(cw/r.width), my=(e.clientY-r.top)*(ch/r.height);
    const hit = rects.find(b => mx>=b.x && mx<=b.x+b.w && my>=b.y && my<=baseY);
    if (hit) { tip.style.opacity=1; tip.style.left=e.clientX+'px'; tip.style.top=e.clientY+'px';
      tip.textContent = `${hit.sum} contributions · week of ${fmtDate(hit.date)}`; }
    else tip.style.opacity=0;
  });
  cv.addEventListener('mouseleave', ()=>tip.style.opacity=0);
</script>
</body>
</html>
