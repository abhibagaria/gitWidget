<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Game of Life — gitWidget prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; background:#05080a; color:#9be9a8;
    display:flex; align-items:center; justify-content:center; padding:32px;
    font-family:'VT323',monospace; }
  .card { background:#0a0f10; border:4px solid #216e39; padding:22px 24px 18px;
    box-shadow:8px 8px 0 #061a0d; }
  h1 { font-family:'Press Start 2P'; font-size:12px; margin:0 0 16px; color:#40c463;
       line-height:1.6; }
  canvas { image-rendering:pixelated; display:block; background:#0d1411;
           border:2px solid #14241a; }
  .bar { display:flex; gap:8px; align-items:center; margin-top:14px; font-size:18px; }
  button { font-family:'VT323',monospace; font-size:17px; cursor:pointer;
    background:#0a0f10; color:#9be9a8; border:2px solid #40c463; padding:3px 12px; }
  button:active { transform:translate(1px,1px); }
  .gen { margin-left:auto; color:#40c463; }
  input[type=range]{ accent-color:#40c463; }
</style>
</head>
<body>
  <div class="card">
    <h1>your commits, evolving</h1>
    <canvas id="c" width="424" height="120"></canvas>
    <div class="bar">
      <button id="play">▶ play</button>
      <button id="step">step</button>
      <button id="seed">⟲ reseed</button>
      <label>speed <input id="speed" type="range" min="1" max="30" value="10"></label>
      <span class="gen">gen <b id="g">0</b> · alive <b id="a">0</b></span>
    </div>
  </div>

<script src="_data.js"></script>
<script>
  const COLS = 53, ROWS = 15, PX = 8; // taller board than 7 so Life has room
  const cv = document.getElementById('c'), ctx = cv.getContext('2d');
  cv.width = COLS*PX; cv.height = ROWS*PX;
  const { weeks } = genContributions();

  let grid, age, gen = 0;
  function seed() {
    grid = Array.from({length:ROWS}, () => new Array(COLS).fill(0));
    age  = Array.from({length:ROWS}, () => new Array(COLS).fill(0));
    // Drop the 7-row contribution graph into the vertical middle of the board.
    const off = Math.floor((ROWS - 7) / 2);
    weeks.forEach((week, x) => week.forEach((day, y) => {
      if (day.level > 0) { grid[off+y][x] = 1; age[off+y][x] = 1; }
    }));
    gen = 0; draw();
  }
  function step() {
    const next = grid.map(r => r.slice());
    let alive = 0;
    for (let y=0; y<ROWS; y++) for (let x=0; x<COLS; x++) {
      let n = 0;
      for (let dy=-1; dy<=1; dy++) for (let dx=-1; dx<=1; dx++) {
        if (!dx && !dy) continue;
        const ny=(y+dy+ROWS)%ROWS, nx=(x+dx+COLS)%COLS; // wrap-around torus
        n += grid[ny][nx];
      }
      next[y][x] = grid[y][x] ? (n===2||n===3?1:0) : (n===3?1:0);
      if (next[y][x]) { age[y][x] = grid[y][x] ? Math.min(age[y][x]+1, 5) : 1; alive++; }
      else age[y][x] = 0;
    }
    grid = next; gen++;
    document.getElementById('g').textContent = gen;
    document.getElementById('a').textContent = alive;
    draw();
  }
  const PAL = ['#0d1411','#9be9a8','#40c463','#30a14e','#216e39','#176f2c'];
  function draw() {
    ctx.fillStyle = '#0d1411'; ctx.fillRect(0,0,cv.width,cv.height);
    for (let y=0; y<ROWS; y++) for (let x=0; x<COLS; x++) {
      if (grid[y][x]) {
        ctx.fillStyle = PAL[Math.min(age[y][x],5)] || '#40c463';
        ctx.fillRect(x*PX, y*PX, PX-1, PX-1);
      }
    }
  }

  let timer = null, fps = 10;
  const play = document.getElementById('play');
  function tick(){ step(); }
  play.onclick = () => {
    if (timer) { clearInterval(timer); timer=null; play.textContent='▶ play'; }
    else { timer = setInterval(tick, 1000/fps); play.textContent='⏸ pause'; }
  };
  document.getElementById('step').onclick = () => { if(timer){clearInterval(timer);timer=null;play.textContent='▶ play';} step(); };
  document.getElementById('seed').onclick = () => { if(timer){clearInterval(timer);timer=null;play.textContent='▶ play';} seed(); };
  document.getElementById('speed').oninput = e => {
    fps = +e.target.value; if (timer){ clearInterval(timer); timer=setInterval(tick,1000/fps); }
  };
  seed();
</script>
</body>
</html>
