<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Quiet — gitWidget</title>
<style>
  :root { font-family: ui-sans-serif, -apple-system, "Segoe UI", Roboto, sans-serif; }
  * { box-sizing: border-box; }
  body { margin:0; background:#1a1a1d; }

  /* two mock "host sites" — the widget inherits each one's text color */
  .host { padding:64px 40px; }
  .host.light { background:#f4f0e8; color:#2a2620; }
  .host.dark  { background:#0b0d11; color:#c4cad2; }

  .site { max-width:560px; margin:0 auto; }
  .name { font-family: Georgia, "Times New Roman", serif; font-size:26px;
          font-weight:600; margin:0 0 4px; letter-spacing:-0.01em; }
  .tag  { margin:0 0 28px; opacity:.62; font-size:16px; line-height:1.5; }

  /* the whole widget: one ink, opacity does everything */
  .grid {
    display:grid; grid-template-columns:repeat(53,9px); grid-template-rows:repeat(7,9px);
    grid-auto-flow:column; gap:3px; width:max-content; cursor:crosshair;
  }
  .cell { background:currentColor; border-radius:1px; opacity:.06;
          transition:opacity .32s ease; }
  .beacon { animation:beat 3.6s ease-in-out infinite; }
  @keyframes beat { 0%,100%{ box-shadow:0 0 0 transparent; } 50%{ box-shadow:0 0 5px currentColor; } }

  .hint { margin:16px 0 0; font-size:12.5px; opacity:.34; letter-spacing:.06em;
          text-transform:lowercase; transition:opacity .8s ease; }
  .hint.gone { opacity:0; }
</style>
</head>
<body>
  <section class="host light">
    <div class="site">
      <h1 class="name">Abhisek Bagaria</h1>
      <p class="tag">Designer who builds. Mostly at night.</p>
      <div class="mount"></div>
      <p class="hint">move across the year</p>
    </div>
  </section>

  <section class="host dark">
    <div class="site">
      <h1 class="name">Abhisek Bagaria</h1>
      <p class="tag">Designer who builds. Mostly at night.</p>
      <div class="mount"></div>
      <p class="hint">move across the year</p>
    </div>
  </section>

<script src="_data.js"></script>
<script>
  const { weeks } = genContributions();

  // most-recent active day → a single quiet "still going" beacon
  let beaconIdx = -1;
  weeks.forEach((w, wi) => w.forEach((d, di) => { if (d.level > 0) beaconIdx = wi * 7 + di; }));

  const STEP = 12, HALF = 4.5, R = 78;           // geometry (matches the CSS grid)
  const base = lv => 0.05 + lv * 0.035;          // faint ghost at rest; busy days a hair stronger
  const peak = lv => lv === 0 ? 0.06 : 0.26 + lv * 0.12; // under the light, only real work flares

  function build(mount) {
    const grid = document.createElement('div');
    grid.className = 'grid';
    const cells = [];
    weeks.forEach((week, wi) => week.forEach((day, di) => {
      const el = document.createElement('span');
      el.className = 'cell' + (wi * 7 + di === beaconIdx ? ' beacon' : '');
      el.style.opacity = base(day.level);
      grid.appendChild(el);
      cells.push({ el, r: di, c: wi, lv: day.level });
    }));
    mount.appendChild(grid);

    const hint = mount.parentElement.querySelector('.hint');
    grid.addEventListener('mousemove', e => {
      hint.classList.add('gone');
      const box = grid.getBoundingClientRect();
      const mx = e.clientX - box.left, my = e.clientY - box.top;
      cells.forEach(c => {
        const dx = mx - (c.c * STEP + HALF), dy = my - (c.r * STEP + HALF);
        let f = 1 - Math.hypot(dx, dy) / R;        // soft spotlight falloff
        f = f > 0 ? f * f : 0;
        c.el.style.opacity = base(c.lv) + f * (peak(c.lv) - base(c.lv));
      });
    });
    grid.addEventListener('mouseleave', () =>
      cells.forEach(c => c.el.style.opacity = base(c.lv)));
  }

  document.querySelectorAll('.mount').forEach(build);
</script>
</body>
</html>
