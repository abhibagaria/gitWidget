<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fireflies — gitWidget</title>
<style>
  :root { font-family: ui-sans-serif, -apple-system, "Segoe UI", Roboto, sans-serif; }
  * { box-sizing:border-box; }
  body { margin:0; }
  .host { background:#0b0d11; color:#dfe4ec; padding:70px 40px; min-height:100vh; }
  .site { max-width:600px; margin:0 auto; }
  .name { font-family:Georgia, serif; font-size:26px; font-weight:600; margin:0 0 4px; color:#c8cdd6; }
  .tag  { margin:0 0 30px; opacity:.5; font-size:16px; color:#c8cdd6; }
  canvas { display:block; width:100%; height:auto; }
</style>
</head>
<body>
  <section class="host">
    <div class="site">
      <h1 class="name">Abhisek Bagaria</h1>
      <p class="tag">Designer who builds. Mostly at night.</p>
      <canvas id="c"></canvas>
    </div>
  </section>

<script src="_data.js"></script>
<script>
  const { weeks } = genContributions();
  const W=620, H=190, dpr=Math.min(window.devicePixelRatio||1,2);
  const cv=document.getElementById('c'), ctx=cv.getContext('2d');
  cv.width=W*dpr; cv.height=H*dpr; cv.style.aspectRatio=W+'/'+H; ctx.scale(dpr,dpr);

  // a warm firefly ink (kept monochrome-ish, just clearly visible)
  const INK=[226,232,240];
  const rgba=a=>`rgba(${INK[0]},${INK[1]},${INK[2]},${a})`;

  const C=7, G=2, STEP=9, gw=53*STEP-G, gx0=(W-gw)/2, gy0=H-(7*STEP-G)-22;

  const cells=[]; const sparkPool=[];
  weeks.forEach((week,wi)=>week.forEach((day,di)=>{
    const idx=cells.length;
    cells.push({ x:gx0+wi*STEP, y:gy0+di*STEP, cx:gx0+wi*STEP+C/2, cy:gy0+di*STEP+C/2, level:day.level });
    for(let k=0;k<day.level;k++) sparkPool.push(idx);   // busier day -> likelier to glow
  }));

  const MAX=8;
  let flies=[], nextSpawn=0, mouse=null;
  const activeOrigin=new Set();

  function spawn(now, age=0){
    const ci=sparkPool[(Math.random()*sparkPool.length)|0];
    if (activeOrigin.has(ci)) return;
    const c=cells[ci]; activeOrigin.add(ci);
    flies.push({ ci, ox:c.cx, oy:c.cy, x:c.cx, y:c.cy,
      vx:(Math.random()-.5)*.6, vy:-.5-Math.random()*.4,
      born:now-age, max:5000+Math.random()*4000, level:c.level,
      phase:Math.random()*6.28, glowR:12+c.level*4, trail:[] });
  }

  function update(now){
    flies=flies.filter(f=>{
      const t=(now-f.born)/f.max;
      if (t>=1){ activeOrigin.delete(f.ci); return false; }
      let ax=Math.sin(now*0.0013+f.phase)*0.03 + Math.cos(now*0.0008+f.phase*1.7)*0.02;
      let ay=Math.cos(now*0.0011+f.phase)*0.026 - 0.012;             // drift upward
      if (mouse){ const dx=mouse.x-f.x, dy=mouse.y-f.y, d=Math.hypot(dx,dy)||1;
        if (d<140){ const k=0.03*(1-d/140); ax+=dx/d*k; ay+=dy/d*k; } }
      if (t>0.82){ ax+=(f.ox-f.x)*0.008; ay+=(f.oy-f.y)*0.008; }     // settle home
      f.vx=(f.vx+ax)*0.94; f.vy=(f.vy+ay)*0.94;
      f.x+=f.vx; f.y+=f.vy;
      const pad=12;
      if(f.x<pad)f.vx+=.4; if(f.x>W-pad)f.vx-=.4; if(f.y<pad)f.vy+=.4; if(f.y>H-pad)f.vy-=.4;
      const env=t<0.06 ? t/0.06 : t>0.85 ? (1-t)/0.15 : 1;
      f.glow=env*(0.7+0.3*Math.sin(now*0.007+f.phase));
      f.trail.unshift({x:f.x,y:f.y}); if(f.trail.length>7) f.trail.pop();
      return true;
    });
    if (now>nextSpawn && flies.length<MAX){ spawn(now); nextSpawn=now+400+Math.random()*1400; }
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    cells.forEach((c,i)=>{
      let a=0.09+c.level*0.05;
      if (activeOrigin.has(i)) a*=0.12;
      ctx.fillStyle=rgba(a); ctx.fillRect(c.x,c.y,C,C);
    });
    flies.forEach(f=>{
      f.trail.forEach((p,i)=>{ const a=f.glow*0.25*(1-i/f.trail.length);
        ctx.fillStyle=rgba(a); ctx.beginPath(); ctx.arc(p.x,p.y,1.6,0,7); ctx.fill(); });
      const g=ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.glowR);
      g.addColorStop(0,rgba(0.75*f.glow)); g.addColorStop(0.4,rgba(0.25*f.glow)); g.addColorStop(1,rgba(0));
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(f.x,f.y,f.glowR,0,7); ctx.fill();
      ctx.fillStyle=rgba(Math.min(1,f.glow+0.35)); ctx.beginPath(); ctx.arc(f.x,f.y,2.2,0,7); ctx.fill();
    });
  }

  function loop(){ const now=performance.now(); update(now); draw(now); requestAnimationFrame(loop); }

  cv.addEventListener('mousemove', e=>{ const r=cv.getBoundingClientRect();
    mouse={ x:(e.clientX-r.left)*(W/r.width), y:(e.clientY-r.top)*(H/r.height) }; });
  cv.addEventListener('mouseleave', ()=> mouse=null);

  // start with a few already drifting, so it's alive immediately
  const t0=performance.now();
  for(let i=0;i<4;i++) spawn(t0, 800+i*900);
  loop();
</script>
</body>
</html>
