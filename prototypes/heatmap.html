<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pixel Heatmap — gitWidget prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    /* GitHub green (default) */
    --l0:#ebedf0; --l1:#9be9a8; --l2:#40c463; --l3:#30a14e; --l4:#216e39;
    --ink:#1b1f23; --panel:#ffffff; --bg:#f6f8fa;
  }
  [data-theme="gameboy"] {
    --l0:#9bbc0f33; --l1:#8bac0f; --l2:#6c901a; --l3:#306230; --l4:#0f380f;
    --ink:#0f380f; --panel:#c4cfa1; --bg:#9bbc0f;
  }
  [data-theme="synth"] {
    --l0:#241b3a; --l1:#5b2a86; --l2:#9d4edd; --l3:#e0479e; --l4:#ff7edb;
    --ink:#f5e9ff; --panel:#1a1430; --bg:#0e0b1a;
  }
  [data-theme="amber"] {
    --l0:#1a1206; --l1:#5a3d08; --l2:#b9770e; --l3:#f2a83b; --l4:#ffd479;
    --ink:#ffd479; --panel:#140d04; --bg:#0a0703;
  }
  * { box-sizing:border-box; }
  body {
    margin:0; min-height:100vh; background:var(--bg);
    display:flex; align-items:center; justify-content:center; padding:32px;
    font-family:'VT323', monospace; color:var(--ink);
    transition:background .3s;
  }
  .card {
    background:var(--panel); padding:24px 26px 20px; border:4px solid var(--ink);
    box-shadow:8px 8px 0 var(--ink); image-rendering:pixelated; max-width:100%;
  }
  h1 { font-family:'Press Start 2P', monospace; font-size:13px; margin:0 0 18px;
       line-height:1.6; }
  h1 b { color:var(--l4); }
  .cal { display:grid; grid-template-columns:auto 1fr; gap:6px; }
  .months { grid-column:2; display:grid; grid-template-columns:repeat(53, 13px);
            gap:3px; font-size:18px; margin-bottom:2px; height:20px; }
  .months span { grid-row:1; }
  .dow { display:grid; grid-template-rows:repeat(7, 13px); gap:3px; font-size:15px;
         align-content:start; padding-top:0; }
  .dow span { line-height:13px; padding-right:6px; }
  .grid { display:grid; grid-template-columns:repeat(53, 13px);
          grid-template-rows:repeat(7, 13px); grid-auto-flow:column; gap:3px; }
  .cell {
    width:13px; height:13px; background:var(--l0); cursor:pointer;
    transform:scale(0); animation:pop .4s forwards;
    transition:outline .08s;
  }
  .cell[data-l="1"]{background:var(--l1);} .cell[data-l="2"]{background:var(--l2);}
  .cell[data-l="3"]{background:var(--l3);} .cell[data-l="4"]{background:var(--l4);}
  .cell:hover { outline:2px solid var(--ink); outline-offset:1px; }
  @keyframes pop { to { transform:scale(1); } }
  .foot { display:flex; justify-content:space-between; align-items:center;
          margin-top:14px; font-size:17px; }
  .legend { display:flex; align-items:center; gap:4px; }
  .legend i { width:13px; height:13px; display:inline-block; }
  .themes { display:flex; gap:6px; }
  .themes button {
    font-family:'VT323',monospace; font-size:16px; cursor:pointer;
    background:var(--panel); color:var(--ink); border:2px solid var(--ink);
    padding:2px 8px;
  }
  .themes button:active { transform:translate(1px,1px); }
  #tip {
    position:fixed; pointer-events:none; background:var(--ink); color:var(--panel);
    font-size:15px; padding:3px 8px; transform:translate(-50%,-130%);
    white-space:nowrap; opacity:0; transition:opacity .1s; z-index:9;
    font-family:'VT323',monospace;
  }
</style>
</head>
<body data-theme="github">
  <div class="card">
    <h1><b id="total">909</b> contributions in the last year</h1>
    <div class="cal">
      <div></div>
      <div class="months" id="months"></div>
      <div class="dow"><span></span><span>Mon</span><span></span><span>Wed</span><span></span><span>Fri</span><span></span></div>
      <div class="grid" id="grid"></div>
    </div>
    <div class="foot">
      <div class="themes">
        <button data-t="github">green</button>
        <button data-t="gameboy">gameboy</button>
        <button data-t="synth">synth</button>
        <button data-t="amber">amber</button>
      </div>
      <div class="legend">Less
        <i style="background:var(--l0)"></i><i style="background:var(--l1)"></i>
        <i style="background:var(--l2)"></i><i style="background:var(--l3)"></i>
        <i style="background:var(--l4)"></i>More
      </div>
    </div>
  </div>
  <div id="tip"></div>

<script src="_data.js"></script>
<script>
  const { weeks, total } = genContributions();
  document.getElementById('total').textContent = total;

  const months = document.getElementById('months');
  monthLabels(weeks).forEach(m => {
    const s = document.createElement('span');
    s.textContent = m.label; s.style.gridColumn = (m.col + 1);
    months.appendChild(s);
  });

  const grid = document.getElementById('grid');
  const tip = document.getElementById('tip');
  let i = 0;
  weeks.forEach(week => week.forEach(day => {
    const c = document.createElement('div');
    c.className = 'cell'; c.dataset.l = day.level;
    c.style.animationDelay = (i++ * 1.2) + 'ms';
    c.addEventListener('mousemove', e => {
      tip.textContent = day.count
        ? `${day.count} contributions · ${fmtDate(day.date)}`
        : `No contributions · ${fmtDate(day.date)}`;
      tip.style.left = e.clientX + 'px'; tip.style.top = e.clientY + 'px';
      tip.style.opacity = 1;
    });
    c.addEventListener('mouseleave', () => tip.style.opacity = 0);
    grid.appendChild(c);
  }));

  document.querySelectorAll('.themes button').forEach(b =>
    b.onclick = () => document.body.dataset.theme = b.dataset.t);
</script>
</body>
</html>
