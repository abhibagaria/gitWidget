<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Contribution widget</title>
<style>
  :root { font-family: ui-sans-serif, -apple-system, "Segoe UI", Roboto, Helvetica, sans-serif; }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; background:#050607;
    display:flex; align-items:center; justify-content:center; padding:32px; }

  .widget {
    width:min(720px,100%);
    background:radial-gradient(120% 140% at 0% 0%, #15191c 0%, #0a0c0d 60%, #070809 100%);
    border:1px solid #1c2024; border-radius:20px; padding:24px 26px 22px;
    box-shadow:0 20px 50px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.04);
  }

  .head { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .count { font-size:26px; font-weight:600; letter-spacing:-.01em; color:#9aa4ad; }
  .count b { color:#3fdd6a; font-weight:700; }
  .chev {
    width:38px; height:38px; flex:none; border-radius:50%; border:1px solid #2a3036;
    display:flex; align-items:center; justify-content:center; color:#aab2ba; text-decoration:none;
    font-size:20px; transition:.15s; background:#0e1113;
  }
  .chev:hover { border-color:#3fdd6a; color:#3fdd6a; transform:translateX(1px); }

  .grid { display:grid; grid-template-columns:repeat(53, 1fr); gap:3px; }
  .cell {
    aspect-ratio:1; border-radius:28%;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.14), inset 0 -1px 1px rgba(0,0,0,.3),
                0 1px 1.5px rgba(0,0,0,.45);
    opacity:0; animation:pop .45s ease forwards;
  }
  @keyframes pop { from { opacity:0; transform:scale(.6); } to { opacity:1; transform:none; } }
  .l0 { background:linear-gradient(180deg,#1b261d,#131c15); box-shadow:inset 0 1px 0 rgba(255,255,255,.05), 0 1px 1.5px rgba(0,0,0,.4); }
  .l1 { background:linear-gradient(180deg,#236a3b,#17502a); }
  .l2 { background:linear-gradient(180deg,#2fa257,#227c41); }
  .l3 { background:linear-gradient(180deg,#4ed070,#36b257); box-shadow:inset 0 1px 0 rgba(255,255,255,.22), 0 1px 1.5px rgba(0,0,0,.45), 0 0 6px rgba(78,208,112,.4); }
  .l4 { background:linear-gradient(180deg,#7cea6c,#54cc50); box-shadow:inset 0 1px 0 rgba(255,255,255,.3), 0 1px 1.5px rgba(0,0,0,.45), 0 0 9px rgba(124,234,108,.55); }
  .cell:hover { outline:1.5px solid rgba(255,255,255,.6); outline-offset:1px; }

  .foot { display:flex; align-items:center; justify-content:space-between; margin-top:18px; }
  .stats { display:flex; gap:20px; font-size:14px; color:#6f7880; }
  .stats b { color:#cfd6dc; font-weight:600; }
  .legend { display:flex; align-items:center; gap:5px; font-size:13px; color:#5b636a; }
  .legend i { width:11px; height:11px; border-radius:28%; display:inline-block; }

  #tip { position:fixed; pointer-events:none; background:#e9edf1; color:#0a0c0d; font-size:13px;
    padding:4px 9px; border-radius:6px; transform:translate(-50%,-140%); white-space:nowrap;
    opacity:0; transition:opacity .1s; z-index:9; font-weight:500; box-shadow:0 4px 14px rgba(0,0,0,.4); }
</style>
</head>
<body>
  <div class="widget">
    <div class="head">
      <div class="count"><b id="total">0</b> contributions in the last year</div>
      <a class="chev" href="#" title="View profile">&rsaquo;</a>
    </div>
    <div class="grid" id="grid"></div>
    <div class="foot">
      <div class="stats" id="stats"></div>
      <div class="legend">Less
        <i class="l0"></i><i class="l1"></i><i class="l2"></i><i class="l3"></i><i class="l4"></i>More
      </div>
    </div>
  </div>
  <div id="tip"></div>

<script src="_data.js"></script>
<script>
  const { weeks } = genContributions();
  const days = [];
  weeks.forEach(w => w.forEach(d => days.push(d)));

  // headline + stats
  const total = days.reduce((s,d)=>s+d.count, 0);
  document.getElementById('total').textContent = total.toLocaleString();

  let cur=0; for (let i=days.length-1; i>=0 && days[i].count>0; i--) cur++;
  let best={count:0}, run=0, longest=0;
  days.forEach(d=>{ if(d.count>0){ run++; longest=Math.max(longest,run);} else run=0;
                    if(d.count>best.count) best=d; });
  document.getElementById('stats').innerHTML =
    `Current streak <b>${cur}d</b>` +
    `<span>Longest streak <b>${longest}d</b></span>` +
    `<span>Best day <b>${best.count}</b></span>`;

  // grid (column = week, row = weekday)
  const grid = document.getElementById('grid'), tip = document.getElementById('tip');
  grid.style.gridTemplateRows = 'repeat(7, 1fr)';
  grid.style.gridAutoFlow = 'column';
  let i = 0;
  weeks.forEach(week => week.forEach(day => {
    const c = document.createElement('div');
    c.className = 'cell l' + day.level;
    c.style.animationDelay = (i++ * 0.7) + 'ms';
    c.addEventListener('mousemove', e => {
      tip.textContent = day.count ? `${day.count} contributions · ${fmtDate(day.date)}`
                                  : `No contributions · ${fmtDate(day.date)}`;
      tip.style.left = e.clientX+'px'; tip.style.top = e.clientY+'px'; tip.style.opacity = 1;
    });
    c.addEventListener('mouseleave', () => tip.style.opacity = 0);
    grid.appendChild(c);
  }));
</script>
</body>
</html>
