<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pixel Garden — gitWidget prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  * { box-sizing:border-box; }
  body {
    margin:0; min-height:100vh; background:#1d2b1f;
    background-image:linear-gradient(#243a27, #16201a);
    display:flex; align-items:center; justify-content:center; padding:32px;
    font-family:'VT323',monospace; color:#dff5d8;
  }
  .card {
    background:#101a12; border:4px solid #dff5d8; padding:22px 24px 16px;
    box-shadow:8px 8px 0 #000;
  }
  h1 { font-family:'Press Start 2P'; font-size:12px; margin:0 0 16px; color:#a6e3a1;
       line-height:1.6; }
  .field {
    display:grid; grid-template-columns:repeat(53, 16px);
    grid-auto-flow:column; grid-template-rows:repeat(7, 16px); gap:2px;
  }
  .plot {
    width:16px; height:16px; image-rendering:pixelated; cursor:pointer;
    opacity:0; animation:rise .5s forwards;
  }
  .plot:hover { outline:2px solid #fff7; }
  @keyframes rise { from{ transform:translateY(4px); opacity:0; } to{ transform:none; opacity:1; } }
  .foot { margin-top:14px; font-size:18px; color:#a6e3a1; display:flex;
          justify-content:space-between; align-items:center; }
  .key { display:flex; gap:14px; font-size:16px; align-items:center; }
  .key span { display:flex; align-items:center; gap:5px; }
  .key svg { width:16px; height:16px; }
  #tip { position:fixed; pointer-events:none; background:#dff5d8; color:#101a12;
         font-size:15px; padding:3px 8px; transform:translate(-50%,-130%);
         white-space:nowrap; opacity:0; z-index:9; }
</style>
</head>
<body>
  <div class="card">
    <h1>🌱 your contribution garden</h1>
    <div class="field" id="field"></div>
    <div class="foot">
      <div><b id="total">0</b> seeds planted this year</div>
      <div class="key" id="key"></div>
    </div>
  </div>
  <div id="tip"></div>

<script src="_data.js"></script>
<script>
  // Pixel sprites drawn as inline SVG (8x8), crisp edges.
  const soil = '#3b2a1a', stem = '#3a7d35', leaf = '#5fbf4e', bud = '#e86fae',
        bloom = '#ff7edb', trunk = '#7a4a22', tree = '#2f8f3a';
  function sprite(level) {
    const r = (x,y,w,h,c) => `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="${c}"/>`;
    let s = `<svg viewBox="0 0 8 8" shape-rendering="crispEdges" xmlns="http://www.w3.org/2000/svg">`;
    s += r(0,7,8,1,soil) + r(1,6,1,1,soil) + r(5,6,1,1,soil); // ground
    if (level === 0) { s += r(3,6,1,1,'#4a3622') + r(5,7,1,1,'#2c2014'); }
    if (level === 1) { s += r(3,5,1,2,stem) + r(2,5,1,1,leaf); }            // sprout
    if (level === 2) { s += r(3,3,1,4,stem) + r(2,4,1,1,leaf) + r(4,4,1,1,leaf) + r(2,3,1,1,leaf); }
    if (level === 3) { s += r(3,3,1,4,stem) + r(2,4,1,1,leaf) + r(4,4,1,1,leaf) + r(3,2,2,1,bud) + r(2,1,1,1,bloom) + r(4,1,1,1,bloom); }
    if (level === 4) { s += r(3,5,2,2,trunk) + r(2,2,4,3,tree) + r(3,1,2,1,tree) + r(1,3,1,1,tree) + r(6,3,1,1,tree); }
    return s + '</svg>';
  }

  const { weeks, total } = genContributions();
  document.getElementById('total').textContent = total;

  const field = document.getElementById('field');
  const tip = document.getElementById('tip');
  let i = 0;
  weeks.forEach(week => week.forEach(day => {
    const d = document.createElement('div');
    d.className = 'plot'; d.innerHTML = sprite(day.level);
    d.style.animationDelay = (i++ * 1.0) + 'ms';
    d.addEventListener('mousemove', e => {
      tip.textContent = day.count ? `${day.count} on ${fmtDate(day.date)}` : `fallow · ${fmtDate(day.date)}`;
      tip.style.left = e.clientX+'px'; tip.style.top = e.clientY+'px'; tip.style.opacity=1;
    });
    d.addEventListener('mouseleave', () => tip.style.opacity = 0);
    field.appendChild(d);
  }));

  const key = document.getElementById('key');
  [['sprout',1],['plant',2],['flower',3],['tree',4]].forEach(([name,l]) => {
    const s = document.createElement('span'); s.innerHTML = sprite(l) + name; key.appendChild(s);
  });
</script>
</body>
</html>
