<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>One Engine, Many Lenses — gitWidget hero prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; background:#0d1117; color:#e6edf3;
    font-family:'VT323',monospace; display:flex; align-items:center;
    justify-content:center; padding:32px; }
  .card { background:#0a0e14; border:3px solid #1f2630; padding:20px 22px 16px;
    box-shadow:8px 8px 0 #05070b; width:min(820px,100%); }
  .top { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px; }
  h1 { font-family:'Press Start 2P'; font-size:12px; margin:0; color:#58a6ff; }
  .engine { font-size:16px; color:#6e7681; }
  .engine b { color:#3fb950; }
  .stage { position:relative; }
  canvas { display:block; width:100%; height:auto; }
  .cap { font-size:17px; color:#8b949e; min-height:22px; margin-top:2px; }
  .cap b { color:#e6edf3; }
  .bar { display:flex; gap:18px; align-items:center; margin-top:10px; flex-wrap:wrap; }
  .group { display:flex; gap:6px; align-items:center; }
  .group small { font-size:14px; color:#6e7681; margin-right:2px; }
  button { font-family:'VT323',monospace; font-size:16px; cursor:pointer;
    background:#0d1117; color:#c9d1d9; border:2px solid #30363d; padding:3px 11px; }
  button.on { border-color:#3fb950; color:#3fb950; }
  button:active { transform:translate(1px,1px); }
  #tip { position:fixed; pointer-events:none; background:#e6edf3; color:#0a0e14;
    font-size:15px; padding:3px 8px; transform:translate(-50%,-135%); white-space:nowrap;
    opacity:0; transition:opacity .08s; z-index:9; font-family:'VT323',monospace; }
</style>
</head>
<body>
  <div class="card">
    <div class="top">
      <h1>one engine, many lenses</h1>
      <div class="engine">1 data engine · <b id="n">0</b> day-records · 3 lenses</div>
    </div>
    <div class="stage">
      <canvas id="c"></canvas>
    </div>
    <div class="cap" id="cap">Same records, re-projected. Switch a lens — the cells <b>move</b>, they're never redrawn.</div>
    <div class="bar">
      <div class="group"><small>lens</small>
        <button data-lens="heatmap" class="on">heatmap</button>
        <button data-lens="skyline">skyline</button>
        <button data-lens="pulse">pulse</button>
      </div>
      <div class="group"><small>theme</small>
        <button data-theme="github" class="on">green</button>
        <button data-theme="synth">synth</button>
        <button data-theme="amber">amber</button>
      </div>
      <div class="group" style="margin-left:auto"><small>hover the cells →</small></div>
    </div>
  </div>
  <div id="tip"></div>

<script src="_data.js"></script>
<script>
  // ---------- design tokens (shared across every lens) ----------
  const THEMES = {
    github: { bg:'#0a0e14', axis:'#2a313c', line:'#3fb950',
      lv:[[33,38,45],[155,233,168],[64,196,99],[48,161,78],[33,110,57]] },
    synth:  { bg:'#120c22', axis:'#3a2d5c', line:'#ff7edb',
      lv:[[36,27,58],[91,42,134],[157,78,221],[224,71,158],[255,126,219]] },
    amber:  { bg:'#0a0703', axis:'#3a2a0e', line:'#ffd479',
      lv:[[26,18,6],[90,61,8],[185,119,14],[242,168,59],[255,212,121]] },
  };

  // ---------- the one data engine ----------
  const { weeks, total } = genContributions();
  const records = [];
  weeks.forEach((week, wi) => week.forEach((day, di) => records.push({ ...day, wi, di })));
  document.getElementById('n').textContent = records.length;

  // logical canvas size
  const W = 800, H = 300, dpr = Math.min(window.devicePixelRatio || 1, 2);
  const cv = document.getElementById('c'), ctx = cv.getContext('2d');
  cv.width = W*dpr; cv.height = H*dpr; cv.style.aspectRatio = W+'/'+H;
  ctx.scale(dpr, dpr);

  let theme = THEMES.github, lens = 'heatmap';

  // ---------- one persistent cell per record (never recreated) ----------
  const STEP = 13, CW = 10, x0 = (W - 53*STEP)/2 + STEP/2, yTop = 64;
  const skyBase = 252, pulseBase = 196;

  const cells = records.map((rec, i) => ({
    rec, x:x0+rec.wi*STEP, y:yTop+rec.di*STEP, w:CW, h:CW, a:1,
    c:[40,40,40], tc:[40,40,40], tx:0, ty:0, tw:CW, th:CW, ta:1,
    k:0.12 + (i % 7) * 0.006,            // slight per-cell variance -> organic morph
  }));

  function col(level){ return theme.lv[level]; }

  // ---------- lens layouts: pure (record) -> target geometry ----------
  function layout() {
    if (lens === 'heatmap') {
      cells.forEach(c => {
        c.tx = x0 + c.rec.wi*STEP; c.ty = yTop + c.rec.di*STEP;
        c.tw = CW; c.th = CW; c.ta = 1; c.tc = col(c.rec.level);
      });
    } else if (lens === 'skyline') {
      weeks.forEach((week, wi) => {
        let stack = 0;
        // bottom-up: lit days become bricks; empties fade to the ground
        for (let di = 0; di < 7; di++) {
          const c = cells[wi*7 + di];
          if (c.rec.level > 0) {
            c.tw = 11; c.th = 8;
            c.tx = x0 + wi*STEP - 0.5;
            c.ty = skyBase - (stack+1)*9; c.ta = 1; c.tc = col(c.rec.level);
            stack++;
          } else {
            c.tw = 3; c.th = 3; c.tx = x0 + wi*STEP + 3.5;
            c.ty = skyBase - 2; c.ta = 0; c.tc = col(0);
          }
        }
      });
    } else { // pulse
      const left = 24, span = W - left*2;
      cells.forEach((c, i) => {
        const idx = c.rec.wi*7 + c.rec.di;
        c.tx = left + (idx/(cells.length-1))*span;
        c.ty = pulseBase - (c.rec.level/4)*78;
        const lit = c.rec.level > 0;
        c.tw = c.th = lit ? 5 : 3; c.ta = lit ? 1 : 0.22; c.tc = col(c.rec.level);
      });
    }
  }
  layout();
  // snap once on first paint so it doesn't fly in from origin
  cells.forEach(c => { c.x=c.tx; c.y=c.ty; c.w=c.tw; c.h=c.th; c.a=c.ta; c.c=c.tc.slice(); });

  // ---------- animation loop: cells ease toward targets ----------
  const lerp = (a,b,k) => a + (b-a)*k;
  function frame() {
    ctx.fillStyle = theme.bg; ctx.fillRect(0,0,W,H);

    // axes per lens (drawn first, behind cells)
    ctx.strokeStyle = theme.axis; ctx.lineWidth = 1;
    if (lens === 'skyline') { ctx.beginPath(); ctx.moveTo(x0-6, skyBase+0.5); ctx.lineTo(x0+53*STEP, skyBase+0.5); ctx.stroke(); }
    if (lens === 'pulse')   { ctx.beginPath(); ctx.moveTo(24, pulseBase+0.5); ctx.lineTo(W-24, pulseBase+0.5); ctx.stroke(); }
    if (lens === 'heatmap') {
      ctx.fillStyle = theme.axis; ctx.font = '12px monospace';
      monthLabels(weeks).forEach(m => ctx.fillText(m.label, x0 + m.col*STEP, yTop-8));
    }

    // tween
    cells.forEach(c => {
      c.x = lerp(c.x, c.tx, c.k); c.y = lerp(c.y, c.ty, c.k);
      c.w = lerp(c.w, c.tw, c.k); c.h = lerp(c.h, c.th, c.k);
      c.a = lerp(c.a, c.ta, c.k);
      c.c[0]=lerp(c.c[0],c.tc[0],c.k); c.c[1]=lerp(c.c[1],c.tc[1],c.k); c.c[2]=lerp(c.c[2],c.tc[2],c.k);
    });

    // pulse connecting line (forms as cells settle)
    if (lens === 'pulse') {
      ctx.strokeStyle = theme.line; ctx.globalAlpha = 0.5; ctx.lineWidth = 1.5;
      ctx.beginPath();
      cells.forEach((c,i) => { const px=c.x+c.w/2, py=c.y+c.h/2; i?ctx.lineTo(px,py):ctx.moveTo(px,py); });
      ctx.stroke(); ctx.globalAlpha = 1;
    }

    cells.forEach(c => {
      ctx.globalAlpha = c.a;
      ctx.fillStyle = `rgb(${c.c[0]|0},${c.c[1]|0},${c.c[2]|0})`;
      ctx.fillRect(c.x, c.y, c.w, c.h);
    });
    ctx.globalAlpha = 1;
    requestAnimationFrame(frame);
  }
  frame();

  // ---------- reveal on interaction ----------
  const tip = document.getElementById('tip');
  cv.addEventListener('mousemove', e => {
    const r = cv.getBoundingClientRect();
    const mx = (e.clientX-r.left)*(W/r.width), my = (e.clientY-r.top)*(H/r.height);
    let best=null, bd=14;
    cells.forEach(c => { if (c.a < 0.3) return;
      const dx=mx-(c.x+c.w/2), dy=my-(c.y+c.h/2), d=Math.hypot(dx,dy);
      if (d<bd){ bd=d; best=c; } });
    if (best) {
      const day = best.rec;
      tip.innerHTML = day.count
        ? `${day.count} contributions · ${fmtDate(day.date)}`
        : `quiet day · ${fmtDate(day.date)}`;
      tip.style.left=e.clientX+'px'; tip.style.top=e.clientY+'px'; tip.style.opacity=1;
    } else tip.style.opacity=0;
  });
  cv.addEventListener('mouseleave', () => tip.style.opacity=0);

  // ---------- controls (lens + shared theme tokens) ----------
  const caps = {
    heatmap: 'A familiar grid — but these are the engine\'s raw <b>day-records</b>.',
    skyline: 'Same cells, restacked: each <b>week</b> is a tower, each lit day a brick.',
    pulse:   'Same cells again, now a <b>year-long pulse</b> — busy months beat harder.',
  };
  document.querySelectorAll('[data-lens]').forEach(b => b.onclick = () => {
    document.querySelectorAll('[data-lens]').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); lens = b.dataset.lens; layout();
    document.getElementById('cap').innerHTML = caps[lens];
  });
  document.querySelectorAll('[data-theme]').forEach(b => b.onclick = () => {
    document.querySelectorAll('[data-theme]').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); theme = THEMES[b.dataset.theme]; layout(); // tokens re-flow everywhere at once
  });
</script>
</body>
</html>
