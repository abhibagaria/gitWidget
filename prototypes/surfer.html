<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ride your year — gitWidget</title>
<style>
  :root { font-family: ui-sans-serif, -apple-system, "Segoe UI", Roboto, sans-serif; }
  * { box-sizing:border-box; }
  body { margin:0; }
  .host { background:#0b0d11; color:#c4cad2; padding:64px 40px; min-height:100vh; }
  .site { max-width:620px; margin:0 auto; }
  .name { font-family:Georgia, serif; font-size:26px; font-weight:600; margin:0 0 4px; }
  .tag  { margin:0 0 26px; opacity:.6; font-size:16px; }
  canvas { display:block; width:100%; height:auto; }
  .hint { margin:14px 0 0; font-size:12.5px; opacity:.34; letter-spacing:.06em;
          text-transform:lowercase; transition:opacity .5s; }
  .hint.gone { opacity:0; }
  .read { margin:6px 0 0; font-size:12.5px; opacity:.5; min-height:18px;
          font-variant-numeric:tabular-nums; }
</style>
</head>
<body>
  <section class="host">
    <div class="site">
      <h1 class="name">Abhisek Bagaria</h1>
      <p class="tag">Designer who builds. Mostly at night.</p>
      <canvas id="c"></canvas>
      <p class="hint" id="hint">press space to ride your year</p>
      <p class="read" id="read">&nbsp;</p>
    </div>
  </section>

<script src="_data.js"></script>
<script>
  const { weeks } = genContributions();
  const W=760, H=210, dpr=Math.min(window.devicePixelRatio||1,2);
  const cv=document.getElementById('c'), ctx=cv.getContext('2d');
  cv.width=W*dpr; cv.height=H*dpr; cv.style.aspectRatio=W+'/'+H; ctx.scale(dpr,dpr);
  const ink = getComputedStyle(document.querySelector('.host')).color;

  // ---------- terrain from weekly contributions ----------
  const sums = weeks.map(w=>w.reduce((s,d)=>s+d.count,0));
  const max = Math.max(...sums,1);
  const raw = sums.map(s=>s/max);
  const norm = raw.map((v,i)=>{ const a=raw[i-1]??v, b=raw[i+1]??v;
    return 0.08 + 0.92*((a+2*v+b)/4); });          // gentle rolling hills, valleys never cliffs

  const PXW=30, screenX=W*0.30, GROUNDBASE=H-20, AMP=H*0.60;
  const lastWeek = weeks.length-1;
  function groundY(wx){ let wf=wx/PXW; wf=Math.max(0,Math.min(lastWeek,wf));
    const i=Math.floor(wf), f=wf-i, a=norm[i], b=norm[Math.min(lastWeek,i+1)];
    const ff=(1-Math.cos(f*Math.PI))/2; return GROUNDBASE-(a+(b-a)*ff)*AMP; }

  // ---------- idle ghost grid (resting state) ----------
  const gC=8, gG=3, gStep=11, gW=53*gStep-gG, gx0=(W-gW)/2, gy0=(H-(7*gStep-gG))/2;

  // ---------- state ----------
  let mode='idle', t=0;            // t: idle(0) -> play(1) transition
  let worldOffset=0, orbY=GROUNDBASE-AMP*0.5, vy=0, momentum=0, grounded=false;
  let pressing=false, air=0, settled=0;
  const trail=[];

  function reset(){ worldOffset=0; orbY=groundY(screenX)-30; vy=0; momentum=0; air=0; settled=0; trail.length=0; }

  function step(){
    worldOffset += (2.0 + momentum);
    vy += 0.25 + (pressing?0.55:0);
    orbY += vy;
    const gxw = worldOffset+screenX, g = groundY(gxw);
    const slope = (groundY(gxw+2)-groundY(gxw-2))/4;   // dy/dx
    if (orbY >= g){
      orbY = g;
      const gain = vy*slope;                            // descending a slope -> speed
      if (gain>0) momentum += gain*0.4*(pressing?1.7:1.0);
      vy = (2.0+momentum)*slope*(slope<0?1.5:1.0);      // ride surface; uphill gives launch
      grounded=true;
    } else grounded=false;
    momentum = Math.max(0, Math.min(7, momentum*0.985));
    vy = Math.max(-13, Math.min(13, vy));
    if (!grounded) air++;
    trail.unshift(orbY); if(trail.length>10) trail.pop();
    if (worldOffset+screenX >= lastWeek*PXW){ mode='end'; }
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    // idle grid, fading out as we start
    if (t<1){ ctx.globalAlpha=1;
      weeks.forEach((week,wi)=>week.forEach((day,di)=>{
        ctx.globalAlpha=(0.05+day.level*0.03)*(1-t);
        ctx.fillStyle=ink; ctx.fillRect(gx0+wi*gStep, gy0+di*gStep, gC, gC); }));
      ctx.globalAlpha=1;
    }
    // terrain, fading in
    if (t>0){
      ctx.save(); ctx.globalAlpha=t;
      // filled silhouette: brighter behind the runner (year you've covered)
      for (const [from,to,alpha] of [[0,screenX,0.16],[screenX,W,0.06]]){
        ctx.beginPath(); ctx.moveTo(from, H);
        for (let sx=from; sx<=to; sx+=3) ctx.lineTo(sx, groundY(worldOffset+sx));
        ctx.lineTo(to, H); ctx.closePath();
        ctx.fillStyle=ink; ctx.globalAlpha=alpha*t; ctx.fill();
      }
      // ground line
      ctx.beginPath();
      for (let sx=0; sx<=W; sx+=2){ const y=groundY(worldOffset+sx); sx?ctx.lineTo(sx,y):ctx.moveTo(sx,y); }
      ctx.globalAlpha=0.5*t; ctx.lineWidth=1.5; ctx.strokeStyle=ink; ctx.stroke();
      // trail
      trail.forEach((ty,i)=>{ ctx.globalAlpha=(0.18*(1-i/trail.length))*t; ctx.fillStyle=ink;
        ctx.beginPath(); ctx.arc(screenX-i*2, ty, 3.2, 0, 7); ctx.fill(); });
      // orb
      ctx.globalAlpha=0.95*t; ctx.fillStyle=ink;
      ctx.beginPath(); ctx.arc(screenX, orbY, 4.2, 0, 7); ctx.fill();
      ctx.restore();
    }
  }

  const readEl=document.getElementById('read');
  function loop(){
    if (mode==='play'){ t=Math.min(1,t+0.06); step();
      const wk=Math.floor((worldOffset+screenX)/PXW);
      readEl.textContent = `${MONTHS[weeks[Math.min(lastWeek,wk)][0].date.getMonth()]} · air ${(air/60).toFixed(1)}s`;
    } else if (mode==='end'){ t=Math.min(1,t+0.06); settled=Math.min(1,settled+0.04);
      orbY += (groundY(worldOffset+screenX)-orbY)*0.2;
      const tot=sums.reduce((a,b)=>a+b,0);
      readEl.textContent = `you rode ${tot} contributions across the year · press space to ride again`;
    } else { t=Math.max(0,t-0.06); }
    draw(); requestAnimationFrame(loop);
  }

  // ---------- input ----------
  function start(){ if(mode==='idle'||mode==='end'){ reset(); mode='play';
      document.getElementById('hint').classList.add('gone'); } }
  addEventListener('keydown', e=>{ if(e.code==='Space'){ e.preventDefault();
    if(mode==='idle'||mode==='end') start(); else pressing=true; } });
  addEventListener('keyup', e=>{ if(e.code==='Space') pressing=false; });
  cv.addEventListener('pointerdown', ()=>{ if(mode==='idle'||mode==='end') start(); else pressing=true; });
  addEventListener('pointerup', ()=> pressing=false);

  loop();
</script>
</body>
</html>
